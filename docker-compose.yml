version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: rental_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: rental_platform

  api:
    build: .
    container_name: rental_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/rental_platform
      NODE_ENV: production
    depends_on:
      - mongo

volumes:
  mongo_data:
