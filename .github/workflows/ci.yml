name: CI

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
    branches: [main, master]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check for syntax errors
        run: node --check src/**/*.js src/controllers/**/*.js src/models/**/*.js src/routes/**/*.js src/middleware/**/*.js src/services/**/*.js

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret
          JWT_EXPIRE: 10m
          JWT_COOKIE_EXPIRE: '30'
          SENDGRID_API_KEY: SG.dummy
          SENDGRID_FROM_EMAIL: test@example.com
          TWILIO_ACCOUNT_SID: ACaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          TWILIO_AUTH_TOKEN: dummy
          TWILIO_WHATSAPP_FROM_NUMBER: whatsapp:+15555555555
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          FACEBOOK_APP_ID: dummy
          FACEBOOK_APP_SECRET: dummy
          CLIENT_URL: http://localhost:3000

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:5000
          REACT_APP_STRIPE_PUBLIC_KEY: pk_test_dummy
